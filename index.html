<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; max-width: 100vw; overflow-x: hidden;
      overflow-y: auto; min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: #F5F7FA;
    }
    :root {
      --primary: #185DD3;
      --primary-light: #E8F0FE;
      --primary-dark: #1248A5;
      --bg-page: #FFFFFF;
      --bg-card: #FFFFFF;
      --bg-panel: #F5F7FA;
      --bg-section: #EDF1F5;
      --grey-1: #202D3F;
      --grey-2: #5A6778;
      --grey-3: #8C96A5;
      --grey-4: #D0D5DD;
      --chart-primary: #185DD3;
      --chart-secondary: #42A5F5;
      --chart-tertiary: #00BFA5;
      --chart-quaternary: #7C4DFF;
      --chart-success: #34C759;
      --chart-warning: #FF9500;
      --chart-danger: #FF3B30;
      --status-success: #34C759;
      --status-danger: #FF3B30;
      --status-warning: #FF9500;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 20px;
      --space-xl: 24px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-elevated: 0 8px 24px rgba(0,0,0,0.10);
    }
    .dashboard { width: 100%; max-width: 1680px; margin: 0 auto; padding: var(--space-xl); overflow: hidden; }
    .header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
      padding: var(--space-lg) 0; gap: var(--space-md);
    }
    .header h1 { font-size: 28px; font-weight: 500; color: var(--grey-1); margin: 0; }
    .filter-bar { display: flex; align-items: center; gap: var(--space-sm); flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--grey-4);
      border-radius: var(--radius-md); font-size: 13px; color: var(--grey-2); cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--primary); }
    .filter-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .btn-primary {
      padding: 10px 20px; background: var(--primary); color: #fff; border: none;
      border-radius: var(--radius-md); font-size: 14px; font-weight: 500; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; transition: all .2s;
    }
    .btn-primary:hover { background: var(--primary-dark); box-shadow: var(--shadow-active); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-outline {
      background: transparent; border: 1px solid var(--grey-4); color: var(--grey-2);
      padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; transition: all .2s;
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* KPI Grid */
    .kpi-groups { display: flex; flex-direction: column; gap: var(--space-lg); margin: var(--space-md) 0; }
    .kpi-group-block { width: 100%; }
    .kpi-group-title { font-size: 13px; color: var(--grey-2); margin-bottom: 8px; font-weight: 500; }
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-md);
    }
    .metric-card {
      background: var(--bg-card); border: 1px solid var(--grey-4);
      border-radius: var(--radius-lg); padding: 18px 20px;
      box-shadow: var(--shadow-card); position: relative; overflow: hidden;
      cursor: pointer; transition: all .2s;
      min-height: 168px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .metric-card.has-chart { min-height: 320px; }
    .metric-card::before {
      content: ''; position: absolute; left: 0; top: 0; right: 0;
      height: 3px; background: linear-gradient(90deg, var(--primary), var(--chart-secondary));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .metric-card:hover { box-shadow: var(--shadow-hover); border-color: var(--primary); transform: translateY(-1px); }
    .metric-card .label { font-size: 13px; color: var(--grey-3); margin-bottom: 4px; }
    .metric-card .value { font-size: 28px; font-weight: 500; color: var(--grey-1); line-height: 1.2; }
    .metric-card .unit { font-size: 12px; color: var(--grey-3); }
    .metric-card .sub { font-size: 12px; color: var(--grey-2); margin-top: 6px; }
    .chart-wrap { margin-top: 10px; border-top: 1px dashed var(--bg-section); padding-top: 10px; }
    .chart-title { font-size: 12px; color: var(--grey-2); margin-bottom: 6px; }
    .chart-caption { margin-top: 6px; font-size: 11px; color: var(--grey-3); line-height: 1.4; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-top: 6px; font-size: 11px; color: var(--grey-2); }
    .legend-item { display: inline-flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .mini-list { margin: 6px 0 0; padding-left: 16px; font-size: 11px; color: var(--grey-2); }
    .mini-list li { margin-bottom: 2px; }
    .health-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 500;
      margin-top: 8px;
      width: fit-content;
    }
    .health-badge.healthy { background: rgba(52,199,89,0.1); color: var(--status-success); }
    .health-badge.warning { background: rgba(255,149,0,0.1); color: var(--status-warning); }
    .health-badge.danger { background: rgba(255,59,48,0.1); color: var(--status-danger); }

    /* Section Titles */
    .section-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 18px; font-weight: 500; color: var(--grey-1);
      padding: var(--space-md) 0; border-bottom: 1px solid var(--bg-section);
      margin-bottom: var(--space-md);
    }
    .section-title .icon { width: 20px; height: 20px; color: var(--primary); }

    /* Tab Group */
    .tab-group {
      display: flex; gap: 0; background: var(--bg-card);
      border: 1px solid var(--grey-4); border-radius: var(--radius-md);
      overflow: hidden; margin-bottom: var(--space-md);
    }
    .tab-btn {
      padding: 8px 16px; font-size: 13px; font-weight: 500; border: none;
      cursor: pointer; background: transparent; color: var(--grey-2);
      transition: all .2s; border-right: 1px solid var(--grey-4);
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active { background: var(--primary); color: #fff; }
    .tab-btn:hover:not(.active) { color: var(--primary); background: var(--primary-light); }

    /* Data Table */
    .table-wrapper { overflow-x: auto; border: 1px solid var(--grey-4); border-radius: var(--radius-lg); background: var(--bg-card); }
    table { width: 100%; border-collapse: collapse; min-width: 600px; table-layout: auto; }
    th {
      padding: 10px 12px; font-size: 12px; font-weight: 500; color: var(--grey-3);
      background: var(--bg-panel); text-align: left; white-space: nowrap;
      border-bottom: 1px solid var(--bg-section); position: sticky; top: 0;
    }
    td { padding: 10px 12px; font-size: 13px; color: var(--grey-1); border-bottom: 1px solid var(--bg-section); }
    tr:hover td { background: var(--primary-light); }
    .status-tag {
      display: inline-block; padding: 2px 8px; border-radius: var(--radius-sm);
      font-size: 11px; font-weight: 500;
    }
    .status-tag.progress { background: rgba(24,93,211,0.1); color: var(--primary); }
    .status-tag.done { background: rgba(52,199,89,0.1); color: var(--status-success); }
    .status-tag.delay { background: rgba(255,149,0,0.1); color: var(--status-warning); }
    .status-tag.reject { background: rgba(255,59,48,0.1); color: var(--status-danger); }
    .status-tag.early { background: rgba(124,77,255,0.1); color: var(--chart-quaternary); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      z-index: 1000; justify-content: center; align-items: flex-start; padding-top: 60px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border-radius: var(--radius-xl);
      width: min(90%, 560px); max-width: 560px; max-height: 85vh; overflow-y: auto;
      box-shadow: var(--shadow-elevated); padding: var(--space-xl);
    }
    .modal h3 { font-size: 18px; font-weight: 500; color: var(--grey-1); margin: 0 0 var(--space-md); }
    .modal .close {
      float: right; background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--grey-3);
    }
    .form-group { margin-bottom: var(--space-md); }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--grey-2); margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 8px 12px; border: 1px solid var(--grey-4);
      border-radius: var(--radius-md); font-size: 13px; color: var(--grey-1);
      transition: border-color .2s;
    }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
    .form-actions { display: flex; gap: var(--space-sm); justify-content: flex-end; margin-top: var(--space-md); }

    /* Delete Confirm */
    .delete-modal { text-align: center; }
    .delete-modal p { color: var(--grey-2); font-size: 14px; margin: var(--space-md) 0; }
    .delete-modal .btn-group { display: flex; gap: var(--space-sm); justify-content: center; }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px; color: var(--grey-3); font-size: 14px; }

    @media (max-width: 1024px) {
      .dashboard { padding: 12px; }
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <div class="dashboard">

          <option value="延期">延期</option>
          <option value="不予转正">不予转正</option>
          <option value="已离职">已离职</option>

          <option value="O序列">O序列</option>
          <option value="非O序列">非O序列</option>
          <option value="提前转正">提前转正</option>

    </div>

    <div class="section-title"><span class="icon">📊</span> 管理指标总览</div>

        <div class="kpi-grid kpi-grid-nochart" id="kpiNoChartGrid"></div>

      <div class="kpi-group-block">
        <div class="kpi-group-title">图表指标卡片</div>
        <div class="kpi-grid kpi-grid-chart" id="kpiChartGrid"></div>

    <!-- Detail Tabs -->

    <div class="tab-group" id="tabGroup">
      <button class="tab-btn active" data-tab="flow" onclick="switchTab('flow')">📋 流程追踪明细</button>
      <button class="tab-btn" data-tab="risk" onclick="switchTab('risk')">⚠️ 风险预警明细</button>
      <button class="tab-btn" data-tab="stage" onclick="switchTab('stage')">🔍 环节追踪明细</button>
    </div>

    <!-- Tables -->

    <div id="riskTable" class="table-wrapper" style="display:none"></div>
    <div id="stageTable" class="table-wrapper" style="display:none"></div>
  </div>

  <!-- Add/Edit Modal -->

      <h3 id="modalTitle">新增转正流程</h3>

      </div>
      <div class="form-row">

        <div class="form-group"><label>员工工号</label><input class="form-control" id="fEmployeeId" placeholder="ERP"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>部门</label><input class="form-control" id="fDepartment"></div>
        <div class="form-group"><label>地区</label><input class="form-control" id="fRegion"></div>
      </div>
      <div class="form-group"><label>业务上级B（直接管理者）</label><input class="form-control" id="fDirectManager"></div>
      <div class="form-group"><label>业务上级A（间接管理者）</label><input class="form-control" id="fIndirectManager"></div>
      <div class="form-group"><label>HRBP</label><input class="form-control" id="fHrbp"></div>
      <div class="form-row">
        <div class="form-group"><label>试用期开始</label><input class="form-control" id="fStartDate" type="date"></div>
        <div class="form-group"><label>试用期到期</label><input class="form-control" id="fEndDate" type="date"></div>
      </div>
      <div class="form-row">

        <div class="form-group"><label>流程状态</label><select class="form-control" id="fStatus"><option>进行中</option><option>已完成</option><option>延期</option><option>不予转正</option><option>已离职</option></select></div>
      </div>
      <div class="form-group"><label>备注</label><textarea class="form-control" id="fRemark" rows="2"></textarea></div>
      <div class="form-actions">
        <button class="btn-outline" onclick="closeAddModal()">取消</button>
        <button class="btn-primary" onclick="saveRecord()">保存</button>
      </div>
    </div>
  </div>

    </div>
  </div>

    const DATA_VERSION = 'v2_50records';
    function initData() {
      let stored = localStorage.getItem(STORAGE_KEY);
      let storedVersion = localStorage.getItem(STORAGE_KEY + '_version');
      if (stored && storedVersion === DATA_VERSION) {
        records = JSON.parse(stored);
      } else {
 records = JSON.parse(JSON.stringify(DEFAULT_RECORDS));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        localStorage.setItem(STORAGE_KEY + '_version', DATA_VERSION);
      }
      renderAll();
    }

    // ============== METRICS COMPUTATION ==============
    function groupCount(rows, field) {
      const m = {};
      rows.forEach(r => { const k = r[field] || '未知'; m[k] = (m[k] || 0) + 1; });
      return m;
    }

    function buildMonthlySeries(rows, valueBuilder) {
      const buckets = {};
      rows.forEach(r => {
        const d = (r.createTime || '').slice(0, 7);
        if (!d) return;
        if (!buckets[d]) buckets[d] = [];
        buckets[d].push(r);
      });
      return Object.keys(buckets).sort().map(m => ({ label: m, value: valueBuilder(buckets[m]) }));
    }

    function buildBarChart(data, color = 'var(--chart-primary)') {
      const max = Math.max(1, ...data.map(d => d.value));
     const w = 260, h = 120, pad = 18;
      const bw = Math.max(14, Math.floor((w - pad * 2) / Math.max(1, data.length) - 6));
      const bars = data.map((d, i) => {
        const x = pad + i * (bw + 6);
        const bh = Math.round((d.value / max) * 72);
        const y = h - 26 - bh;
        return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="2"></rect><text x="${x + bw / 2}" y="${h - 12}" text-anchor="middle" font-size="9" fill="#5A6778">${d.label.slice(0,4)}</text><text x="${x + bw / 2}" y="${Math.max(10, y - 4)}" text-anchor="middle" font-size="9" fill="#202D3F">${d.value}</text>`;
      }).join('');
      return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="140" role="img">${bars}</svg>`;
    }

    function buildLineChart(data) {
      const w = 260, h = 120, pad = 20;
      const max = Math.max(1, ...data.map(d => d.value));
      const step = data.length > 1 ? (w - pad * 2) / (data.length - 1) : 0;
      const points = data.map((d, i) => {
        const x = pad + i * step;
        const y = h - pad - (d.value / max) * (h - pad * 2);
        return { x, y, label: d.label, value: d.value };
      });
      const path = points.map((p, i) => `${i ? 'L' : 'M'}${p.x},${p.y}`).join(' ');
      const nodes = points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="var(--chart-primary)"></circle><text x="${p.x}" y="${h - 6}" text-anchor="middle" font-size="8" fill="#5A6778">${p.label.slice(5)}</text>`).join('');
      return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="140" role="img"><path d="${path}" fill="none" stroke="var(--chart-primary)" stroke-width="2"></path>${nodes}</svg>`;
    }

    function buildPieChart(data) {
      const total = Math.max(1, data.reduce((s, d) => s + d.value, 0));
      const cx = 70, cy = 70, r = 48;
      let start = -Math.PI / 2;
      const colors = ['#FF9500', '#FF3B30', '#42A5F5', '#7C4DFF', '#00BFA5', '#185DD3'];
      const slices = data.map((d, i) => {
        const angle = (d.value / total) * Math.PI * 2;
        const end = start + angle;
        const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
        const x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
        const largeArc = angle > Math.PI ? 1 : 0;
        const pct = ((d.value / total) * 100).toFixed(1);
        const mid = start + angle / 2;
        const tx = cx + (r + 16) * Math.cos(mid), ty = cy + (r + 16) * Math.sin(mid);
        const p = `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${colors[i % colors.length]}"></path><text x="${tx}" y="${ty}" font-size="9" fill="#202D3F" text-anchor="middle">${pct}%</text>`;
        start = end;
        return { svg: p, color: colors[i % colors.length], label: d.label, value: d.value, pct };
      });
      return {
        svg: `<svg viewBox="0 0 160 140" width="100%" height="140" role="img">${slices.map(s => s.svg).join('')}</svg>`,
        legend: slices
      };
    }

    function getMetricDetailRows(metricKey, sourceRows, metricSnapshot) {
      const rows = Array.isArray(sourceRows) ? sourceRows : [];
      if (!rows.length) return [];

      if (metricKey === 'delayRate') return rows.filter(r => r.status === '延期');
      if (metricKey === 'rejectRate') return rows.filter(r => r.status === '不予转正' || r.status === '已离职');
      if (metricKey === 'earlyRate') return rows.filter(r => r.employeeType === '提前转正');
      if (metricKey === 'activeCount') return rows.filter(r => r.status === '进行中');
      if (metricKey === 'onTimeRate') return rows.filter(r => r.status === '已完成');
      if (metricKey === 'closureRate') return rows.filter(r => r.status === '延期' || r.status === '不予转正' || r.status === '已离职');

      if (metricKey === 'topStageCount' || metricKey === 'topStage') {
        const topStage = metricSnapshot?.topStage?.value;
        if (!topStage || topStage === '—') return [];
        return rows.filter(r => r.currentStage === topStage);
      }

      if (metricKey === 'avgProcessDays') {
        return rows.filter(r => r.createTime && (r.completeTime || r.endDate));
      }

      if (metricKey === 'onlineRate') {
        return rows.filter(r => r.createTime);
      }

      return rows;
    }

    function computeKpiMetrics(rows) {
      const total = rows.length;
      const active = rows.filter(r => r.status === '进行中').length;
      const done = rows.filter(r => r.status === '已完成').length;
      const delay = rows.filter(r => r.status === '延期').length;
      const reject = rows.filter(r => r.status === '不予转正').length;
      const early = rows.filter(r => r.employeeType === '提前转正').length;
      const deptCount = groupCount(rows, 'department');
      const stageCount = groupCount(rows, 'currentStage');
      const stageList = Object.entries(stageCount).sort((a,b)=>b[1]-a[1]);

      const durationByDept = {};
      rows.forEach(r => {
        if (!r.createTime || !(r.completeTime || r.endDate)) return;
        const d = Math.max(0, (new Date(r.completeTime || r.endDate) - new Date(r.createTime)) / 86400000);
        const dept = r.department || '未知';
        if (!durationByDept[dept]) durationByDept[dept] = [];
        durationByDept[dept].push(d);
      });
      const avgByDept = Object.entries(durationByDept).map(([k, v]) => ({ label: k, value: Number((v.reduce((a,b)=>a+b,0) / Math.max(1, v.length)).toFixed(1)) }));
      const totalDays = avgByDept.reduce((s, d) => s + d.value, 0);
      const avgDays = avgByDept.length ? (totalDays / avgByDept.length).toFixed(1) : '0';

      const onTime = done > 0 ? ((done / (done + delay + reject)) * 100).toFixed(1) : '0';
      const delayRate = total > 0 ? ((delay / total) * 100).toFixed(1) : '0';
      const rejectRate = total > 0 ? ((reject / total) * 100).toFixed(1) : '0';
      const earlyRate = total > 0 ? ((early / total) * 100).toFixed(1) : '0';
      const onlineRate = total > 0 ? ((done / total) * 100).toFixed(1) : '0';

      const abnormalRows = rows.filter(r => r.status === '延期' || r.status === '不予转正' || r.status === '已离职');
      const abnormalDeptDist = Object.entries(groupCount(abnormalRows, 'department')).map(([k, v]) => ({ label: k, value: v }));

      // 各饼图指标独立数据源
      const closurePieData = Object.entries(groupCount(abnormalRows, 'department')).map(([k, v]) => ({ label: k, value: v }));
      const delayRows = rows.filter(r => r.status === '延期');
      const delayPieData = Object.entries(groupCount(delayRows, 'department')).map(([k, v]) => ({ label: k, value: v }));
      const rejectRows = rows.filter(r => r.status === '不予转正' || r.status === '已离职');
      const rejectPieData = Object.entries(groupCount(rejectRows, 'department')).map(([k, v]) => ({ label: k, value: v }));
      const earlyRows = rows.filter(r => r.employeeType === '提前转正');
      const earlyPieData = Object.entries(groupCount(earlyRows, 'department')).map(([k, v]) => ({ label: k, value: v }));
      const onTimeAbnormal = rows.filter(r => r.status === '延期' || r.status === '不予转正');
      const onTimePieData = Object.entries(groupCount(onTimeAbnormal, 'department')).map(([k, v]) => ({ label: k, value: v }));

      return {
        closureRate: { value: onTime, unit: '%', health: Number(onTime) >= 80 ? 'healthy' : 'warning', chartType: 'pie_abnormal', abnormalRate: (100 - Number(onTime)).toFixed(1), pieData: closurePieData },
        avgProcessDays: { value: avgDays, unit: '天', health: Number(avgDays) <= 30 ? 'healthy' : Number(avgDays) <= 45 ? 'warning' : 'danger', chartType: avgByDept.length <= 10 ? 'bar_avg' : 'none', barData: avgByDept },
        activeCount: { value: active, unit: '人', health: active <= 5 ? 'healthy' : active <= 10 ? 'warning' : 'danger', chartType: 'none' },
        onTimeRate: { value: onTime, unit: '%', health: Number(onTime) >= 80 ? 'healthy' : 'warning', chartType: 'pie_abnormal', abnormalRate: (100 - Number(onTime)).toFixed(1), pieData: onTimePieData },
        delayRate: { value: delayRate, unit: '%', health: Number(delayRate) <= 15 ? 'healthy' : 'warning', chartType: 'pie_abnormal', abnormalRate: delayRate, pieData: delayPieData },
        rejectRate: { value: rejectRate, unit: '%', health: Number(rejectRate) <= 5 ? 'healthy' : 'warning', chartType: 'pie_abnormal', abnormalRate: rejectRate, pieData: rejectPieData },
        earlyRate: { value: earlyRate, unit: '%', health: Number(earlyRate) <= 20 ? 'healthy' : 'warning', chartType: 'pie_abnormal', abnormalRate: earlyRate, pieData: earlyPieData },
        onlineRate: { value: onlineRate, unit: '%', health: Number(onlineRate) >= 90 ? 'healthy' : 'warning', chartType: 'line_time', lineData: buildMonthlySeries(rows, mRows => Number(((mRows.filter(r => r.status === '已完成').length / Math.max(1, mRows.length)) * 100).toFixed(1))) },
        topStage: { value: stageList.length ? stageList[0][0] : '—', unit: '', health: 'healthy', chartType: 'none' },
        topStageCount: { value: stageList.length ? stageList[0][1] : 0, unit: '人', health: stageList.length && stageList[0][1] > 5 ? 'warning' : 'healthy', chartType: stageList.length <= 10 ? 'bar_max' : 'none', barData: stageList.map(([k,v]) => ({label:k,value:v})) },
        _meta: { deptCount: Object.keys(deptCount).length, stageCount: stageList.length, deptDist: Object.entries(deptCount).map(([k,v]) => ({label:k,value:v})), abnormalDeptDist }
      };
    }

    function buildCardChartHtml(card, metric, metrics) {
      if (!metric || metric.chartType === 'none') return '';
      if ((metric.chartType === 'bar_avg' || metric.chartType === 'bar_max') && (!metric.barData || metric.barData.length > 10)) return '';
      if (metric.chartType === 'line_time' && (!metric.lineData || metric.lineData.length < 2)) return '';

      if (metric.chartType === 'bar_avg' || metric.chartType === 'bar_max') {
        const svg = buildBarChart(metric.barData);
        const list = metric.barData.map(d => `<li>${d.label}: ${d.value}${metric.chartType==='bar_avg'?'天':'人'}</li>`).join('');
        return `<div class="chart-wrap"><div class="chart-title">${metric.chartType==='bar_avg'?'类目均值柱状图':'类目极值柱状图'}（类目数≤10）</div>${svg}<ul class="mini-list">${list}</ul><div class="chart-legend"><span class="legend-item"><span class="legend-dot" style="background:var(--chart-primary)"></span>${metric.chartType==='bar_avg'?'平均耗时(天)':'人数'}</span></div><div class="chart-caption">图注：来源于流程明细数据按类目聚合计算。</div></div>`;
      }

      if (metric.chartType === 'line_time') {
        const svg = buildLineChart(metric.lineData);
        return `<div class="chart-wrap"><div class="chart-title">时间趋势折线图</div>${svg}<div class="chart-legend"><span class="legend-item"><span class="legend-dot" style="background:var(--chart-primary)"></span>完成率(%)</span></div><div class="chart-caption">图注：按月聚合，数据来源于流程明细表 createTime。</div></div>`;
      }

      if (metric.chartType === 'pie_abnormal') {
        const dist = (metric.pieData && metric.pieData.length)
          ? metric.pieData
          : [];
        if (!dist.length) {
          return `<div class="chart-wrap"><div class="chart-title">异常数据来源占比饼图</div><div class="empty-state" style="margin:8px 0">当前筛选下无异常明细，暂不绘图</div><div class="chart-caption">图注：仅抽取异常部分；正常数据不入图。</div></div>`;
        }
        const pie = buildPieChart(dist.slice(0, 6));
        const legend = pie.legend.map(l => `<span class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${l.label} ${l.pct}%</span>`).join('');
        return `<div class="chart-wrap"><div class="chart-title">异常数据来源占比饼图（仅异常部分 ${metric.abnormalRate}%）</div>${pie.svg}<div class="chart-legend">${legend}</div><div class="chart-caption">图注：仅抽取异常部分；正常数据不入图。数据来源于明细表按部门聚合。</div></div>`;
      }
      return '';
    }

    function renderKpiCards(metrics) {
      const noChartGrid = document.getElementById('kpiNoChartGrid');
      const chartGrid = document.getElementById('kpiChartGrid');
      noChartGrid.innerHTML = '';
      chartGrid.innerHTML = '';

      const cards = [
        {label:'转正风险闭环及时率',key:'closureRate',desc:'已转正/应转正'},
        {label:'平均流程耗时(天)',key:'avgProcessDays',desc:'从发起到完成'},
        {label:'在办员工数',key:'activeCount',desc:'当前进行中'},
        {label:'按期转正率',key:'onTimeRate',desc:'已转正/总人数'},
        {label:'延期转正率',key:'delayRate',desc:'延期/总人数'},
        {label:'不予转正率',key:'rejectRate',desc:'不适岗'},
        {label:'提前转正占比',key:'earlyRate',desc:'提前/总人数'},
        {label:'转正流程线上化率',key:'onlineRate',desc:'按月趋势'},
        {label:'TOP环节在办人数',key:'topStageCount',desc:'最拥挤环节'},
        {label:'最卡点环节',key:'topStage',desc:'耗时最长'}
      ];

      cards.forEach(c => {
        const m = metrics[c.key];
        const healthLabel = {healthy:'健康',warning:'预警',danger:'风险'};
        const badgeClass = m.health || 'healthy';
        const chartHtml = buildCardChartHtml(c, m, metrics);
        const card = document.createElement('div');
        card.className = `metric-card ${chartHtml ? 'has-chart' : ''}`;
        card.onclick = () => openKpiDetail(c.key);
        card.innerHTML = `<div class="label">${c.label}</div><div class="value">${m.value}<span class="unit">${m.unit}</span></div><div class="sub">${c.desc}</div><span class="health-badge ${badgeClass}">● ${healthLabel[badgeClass] || '—'}</span>${chartHtml}`;
        (chartHtml ? chartGrid : noChartGrid).appendChild(card);
      });
    }

    // ============== RENDER TABLES ==============
    function renderFlowTable(rows) {
      const el = document.getElementById('flowTable');
      el.style.display = '';
      document.getElementById('riskTable').style.display = 'none';
      document.getElementById('stageTable').style.display = 'none';
      if (!rows.length) { el.innerHTML = '<div class="empty-state">暂无匹配记录</div>'; return; }
      let html = `<table><thead><tr><th>员工姓名</th><th>类型</th><th>部门</th><th>直接管理者</th><th>HRBP</th><th>当前环节</th><th>状态</th><th>发起时间</th><th>操作</th></tr></thead><tbody>`;
      rows.slice(0,12).forEach(r => {
        const st = { '进行中':'progress','已完成':'done','延期':'delay','不予转正':'reject','已离职':'reject' };
        html += `<tr><td>${r.employeeName}</td><td>${r.employeeType}</td><td>${r.department}</td><td>${r.directManager}</td><td>${r.hrbp}</td><td>${r.currentStage}</td>
          <td><span class="status-tag ${st[r.status]||'progress'}">${r.status}</span></td>
          <td>${r.createTime || '—'}</td>
          <td><button class="btn-outline" onclick="editRecord('${r.id}')">✏️</button> <button class="btn-outline" onclick="openDeleteModal('${r.id}')">🗑️</button></td></tr>`;
      });
      html += '</tbody></table>';
      if (rows.length > 12) html += `<div style="padding:8px;text-align:center;color:var(--grey-3);font-size:12px;">共 ${rows.length} 条，仅展示前12条</div>`;
      el.innerHTML = html;
    }

    function renderRiskTable(rows) {
      const el = document.getElementById('riskTable');
      el.style.display = '';
      document.getElementById('flowTable').style.display = 'none';
      document.getElementById('stageTable').style.display = 'none';
      const risks = rows.filter(r => r.status === '延期' || r.status === '不予转正' || r.status === '已离职');
      if (!risks.length) { el.innerHTML = '<div class="empty-state">✅ 当前无风险记录</div>'; return; }
      let html = `<table><thead><tr><th>员工</th><th>类型</th><th>风险状态</th><th>处理人</th><th>到期日</th><th>备注</th></tr></thead><tbody>`;
      risks.forEach(r => {
        const st = { '延期':'delay','不予转正':'reject','已离职':'reject' };
        html += `<tr><td>${r.employeeName}</td><td>${r.employeeType}</td><td><span class="status-tag ${st[r.status]||'delay'}">${r.status}</span></td><td>${r.hrbp}</td><td>${r.endDate}</td><td>${r.remark}</td></tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
      
      // Also update KPI detail modal content
      if (risks.length > 0) {
        const modalBody = document.getElementById('kpiModalBody');
        if (modalBody) {
          let detailHtml = `<div style="margin-bottom:12px"><strong>当前风险记录</strong> — ${risks.length}条</div><table style="width:100%"><thead><tr><th>员工</th><th>状态</th><th>处理人</th><th>到期日</th></tr></thead><tbody>`;
          risks.forEach(r => {
            detailHtml += `<tr><td>${r.employeeName}</td><td>${r.status}</td><td>${r.hrbp}</td><td>${r.endDate}</td></tr>`;
          });
          detailHtml += '</tbody></table>';
          modalBody.innerHTML = detailHtml;
        }
      }
    }

    function renderStageTable(rows) {
      const el = document.getElementById('stageTable');
      el.style.display = '';
      document.getElementById('flowTable').style.display = 'none';
      document.getElementById('riskTable').style.display = 'none';
      const stages = {};
      rows.forEach(r => {
        const key = r.currentStage + '|' + r.hrbp;
        if (!stages[key]) stages[key] = { stage: r.currentStage, handler: r.hrbp, count: 0, names: [] };
        stages[key].count++;
        stages[key].names.push(r.employeeName);
      });
      const stageArr = Object.values(stages);
      if (!stageArr.length) { el.innerHTML = '<div class="empty-state">暂无环节数据</div>'; return; }
      let html = `<table><thead><tr><th>环节</th><th>处理人</th><th>人数</th><th>涉及员工</th></tr></thead><tbody>`;
      stageArr.forEach(s => {
        html += `<tr><td>${s.stage}</td><td>${s.handler}</td><td>${s.count}</td><td>${s.names.join(', ')}</td></tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    // ============== FILTERS ==============
    function renderAll() {
      filteredRecords = [...records];
      currentMetricRows = [...filteredRecords];
      currentMetrics = computeKpiMetrics(currentMetricRows);
      renderKpiCards(currentMetrics);
      if (activeTab === 'flow') renderFlowTable(filteredRecords);
      else if (activeTab === 'risk') renderRiskTable(filteredRecords);
      else renderStageTable(filteredRecords);
    }

    function applyFilters() {
      const status = document.getElementById('globalStatusFilter').value;
      const type = document.getElementById('globalTypeFilter').value;
      const search = document.getElementById('globalSearch').value.toLowerCase();
      let filtered = [...records];
      if (status) filtered = filtered.filter(r => r.status === status);
      if (type) filtered = filtered.filter(r => r.employeeType === type);
      if (search) filtered = filtered.filter(r => r.employeeName.toLowerCase().includes(search));
      filteredRecords = filtered;
      currentMetricRows = [...filteredRecords];
      currentMetrics = computeKpiMetrics(currentMetricRows);
      renderKpiCards(currentMetrics);
      
      if (activeTab === 'flow') renderFlowTable(filtered);
      else if (activeTab === 'risk') renderRiskTable(filtered);
      else renderStageTable(filtered);
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      if (tab === 'flow') renderFlowTable(filteredRecords.length ? filteredRecords : records);
      else if (tab === 'risk') renderRiskTable(filteredRecords.length ? filteredRecords : records);
      else renderStageTable(filteredRecords.length ? filteredRecords : records);
    }

    // ============== CRUD ==============
    function openAddModal() {
      editTargetId = null;
      document.getElementById('modalTitle').textContent = '新增转正流程';
      ['fEmployeeName','fEmployeeId','fDepartment','fRegion','fDirectManager','fIndirectManager','fHrbp','fRemark'].forEach(id => {
        document.getElementById(id).value = '';
      });
      ['fEmployeeType','fStage','fStatus'].forEach(id => {
        document.getElementById(id).selectedIndex = 0;
      });
      document.getElementById('fStartDate').value = '';
      document.getElementById('fEndDate').value = '';
      document.getElementById('addModal').classList.add('open');
    }

    function editRecord(id) {
      const r = records.find(x => x.id === id);
      if (!r) return;
      editTargetId = id;
      document.getElementById('modalTitle').textContent = '编辑转正流程';
      document.getElementById('fEmployeeName').value = r.employeeName;
      document.getElementById('fEmployeeId').value = r.employeeId;
      document.getElementById('fEmployeeType').value = r.employeeType;
      document.getElementById('fDepartment').value = r.department;
      document.getElementById('fRegion').value = r.region;
      document.getElementById('fDirectManager').value = r.directManager;
      document.getElementById('fIndirectManager').value = r.indirectManager;
      document.getElementById('fHrbp').value = r.hrbp;
      document.getElementById('fStartDate').value = r.startDate;
      document.getElementById('fEndDate').value = r.endDate;
      document.getElementById('fStage').value = r.currentStage;
      document.getElementById('fStatus').value = r.status;
      document.getElementById('fRemark').value = r.remark;
      document.getElementById('addModal').classList.add('open');
    }

    function saveRecord() {
      const name = document.getElementById('fEmployeeName').value.trim();
      if (!name) { alert('请填写员工姓名'); return; }
      const rec = {
        id: editTargetId || 'R' + Date.now().toString(36),
        employeeName: name,
        employeeId: document.getElementById('fEmployeeId').value,
        employeeType: document.getElementById('fEmployeeType').value,
        department: document.getElementById('fDepartment').value,
        region: document.getElementById('fRegion').value,
        directManager: document.getElementById('fDirectManager').value,
        indirectManager: document.getElementById('fIndirectManager').value,
        hrbp: document.getElementById('fHrbp').value,
        startDate: document.getElementById('fStartDate').value,
        endDate: document.getElementById('fEndDate').value,
        currentStage: document.getElementById('fStage').value,
        status: document.getElementById('fStatus').value,
        createTime: new Date().toISOString().slice(0,10),
        completeTime: '',
        remark: document.getElementById('fRemark').value,
      };
      if (editTargetId) {
        const idx = records.findIndex(x => x.id === editTargetId);
        if (idx >= 0) { records[idx] = { ...records[idx], ...rec, id: editTargetId }; }
      } else {
        records.unshift(rec);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      closeAddModal();
      applyFilters();
    }

    function openDeleteModal(id) {
      deleteTargetId = id;
      const r = records.find(x => x.id === id);
      document.getElementById('deleteMsg').textContent = `确定要删除 "${r?.employeeName}" 的转正记录吗？`;
      document.getElementById('deleteModal').classList.add('open');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('open');
      deleteTargetId = null;
    }

    function confirmDelete() {
      if (deleteTargetId) {
        records = records.filter(x => x.id !== deleteTargetId);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        closeDeleteModal();
        applyFilters();
      }
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('open');
      editTargetId = null;
    }

    function closeKpiDetailModal() {
      document.getElementById('kpiDetailModal').classList.remove('open');
    }

    function openKpiDetail(key) {
      const modal = document.getElementById('kpiDetailModal');
      const title = document.getElementById('kpiModalTitle');
      const body = document.getElementById('kpiModalBody');
      const labels = {closureRate:'转正风险闭环及时率',avgProcessDays:'平均流程耗时',activeCount:'在办员工',onTimeRate:'按期转正率',delayRate:'延期率',rejectRate:'不予转正率',earlyRate:'提前转正占比',onlineRate:'线上化率',topStageCount:'TOP环节人数',topStage:'最卡点环节'};
      title.textContent = `${labels[key] || key} · 明细`;

      const sourceRows = currentMetricRows.length ? currentMetricRows : (filteredRecords.length ? filteredRecords : records);
      const metricSnapshot = currentMetrics || computeKpiMetrics(sourceRows);
      const detailRows = getMetricDetailRows(key, sourceRows, metricSnapshot);

      let html = '';
      if (detailRows.length > 0) {
        html = `<table style="width:100%"><thead><tr><th>员工</th><th>部门</th><th>状态</th><th>环节</th></tr></thead><tbody>`;
        detailRows.slice(0,10).forEach(r => {
          html += `<tr><td>${r.employeeName}</td><td>${r.department}</td><td>${r.status}</td><td>${r.currentStage}</td></tr>`;
        });
        html += '</tbody></table>';
        html += `<div style="margin-top:8px;font-size:11px;color:var(--grey-3)">☝ 共 ${detailRows.length} 条匹配明细，数据与图表同源（流程明细表聚合）</div>`;
      } else {
        html = `<div class="empty-state">暂无匹配明细数据</div>`;
      }
      body.innerHTML = html;
      modal.classList.add('open');
    }

    // ============== INIT ==============
    window.onload = function() {
      initData();
      // Set default filters
      applyFilters();
      // Add mini chart rendering for some cards
    };
  </script>
</body>
</html>
